<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — Cloud Cost Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#1a1d27;border:1px solid #2a2d3d;border-radius:16px;padding:40px;width:100%;max-width:460px}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
    .logo-icon{width:42px;height:42px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .logo-text{font-size:18px;font-weight:700;color:#fff}
    .logo-sub{font-size:11px;color:#8b92a5;margin-top:2px}
    h1{font-size:24px;font-weight:700;color:#fff;text-align:center;margin-bottom:6px}
    .subtitle{font-size:14px;color:#8b92a5;text-align:center;margin-bottom:28px}
    .form-group{margin-bottom:18px}
    label{display:block;font-size:13px;font-weight:500;color:#c5c8d6;margin-bottom:6px}
    input{width:100%;padding:11px 14px;background:#0f1117;border:1px solid #2a2d3d;border-radius:8px;color:#fff;font-size:14px;outline:none;transition:border-color .2s}
    input:focus{border-color:#667eea}
    input::placeholder{color:#4a4e63}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .btn{width:100%;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:6px}
    .btn:hover{opacity:.9}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .divider{text-align:center;color:#4a4e63;font-size:13px;margin:20px 0;position:relative}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#2a2d3d}
    .divider::before{left:0}.divider::after{right:0}
    .signin-link{text-align:center;font-size:14px;color:#8b92a5;margin-top:20px}
    .signin-link a{color:#667eea;text-decoration:none;font-weight:500}
    .signin-link a:hover{text-decoration:underline}
    .error{background:#2d1f1f;border:1px solid #5c2626;border-radius:8px;padding:12px;color:#ff6b6b;font-size:13px;margin-bottom:16px;display:none}
    .badges{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
    .badge{background:#1e2235;border:1px solid #2a2d3d;border-radius:20px;padding:4px 12px;font-size:11px;color:#8b92a5;display:flex;align-items:center;gap:5px}
    .badge span{font-size:14px}
    .terms{font-size:12px;color:#4a4e63;text-align:center;margin-top:14px;line-height:1.5}
    .terms a{color:#667eea;text-decoration:none}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">&#9729;</div>
    <div>
      <div class="logo-text">Cloud Cost Analyzer</div>
      <div class="logo-sub">Multi-Cloud Intelligence</div>
    </div>
  </div>

  <h1>Create your organisation</h1>
  <p class="subtitle">Start your free trial — no credit card required</p>

  <div class="badges">
    <div class="badge"><span>&#9729;</span> Azure</div>
    <div class="badge"><span>&#9881;</span> AWS</div>
    <div class="badge"><span>&#11044;</span> GCP</div>
  </div>

  <div class="error" id="error-msg"></div>

  <form id="signup-form">
    <div class="form-group">
      <label>Organisation Name</label>
      <input type="text" id="org_name" placeholder="Acme Corp" required autocomplete="organization"/>
    </div>
    <div class="row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="first_name" placeholder="Jane" required autocomplete="given-name"/>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="last_name" placeholder="Smith" required autocomplete="family-name"/>
      </div>
    </div>
    <div class="form-group">
      <label>Work Email</label>
      <input type="email" id="email" placeholder="jane@acme.com" required autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 8 characters" required autocomplete="new-password"/>
    </div>
    <button type="submit" class="btn" id="submit-btn">Create Account &rarr;</button>
    <p class="terms">By creating an account you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
  </form>

  <div class="signin-link">Already have an account? <a href="/login">Sign in</a></div>
</div>

<script>
document.getElementById('signup-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Creating account…';

  const payload = {
    org_name: document.getElementById('org_name').value.trim(),
    first_name: document.getElementById('first_name').value.trim(),
    last_name: document.getElementById('last_name').value.trim(),
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value
  };

  try {
    const res = await fetch('/api/signup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (res.ok && data.success) {
      window.location.href = '/onboarding';
    } else {
      errEl.textContent = data.error || 'Signup failed. Please try again.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Create Account →';
    }
  } catch (err) {
    errEl.textContent = 'Network error. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Create Account →';
  }
});
</script>
</body>
</html>
